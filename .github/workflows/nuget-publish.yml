name: Build and Publish NuGet Packages

on:
  push:
    branches:
      - main
      - Development
    paths:
      - 'src/**'
      - '.github/workflows/nuget-publish.yml'

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure GitHub NuGet source
        run: >
          dotnet nuget add source
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --name github
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text

      # ── Dyvenix.App1.Common.Shared ──────────────────────────────────────────

      - name: Check Shared version
        id: shared
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/Common.Shared/Common.Shared.csproj)
          echo "version=$VERSION"
          EXISTS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/download/dyvenix.app1.common.shared/index.json" \
            | grep -c "\"$VERSION\"" || true)
          if [ "$EXISTS" = "0" ]; then echo "publish=true" >> "$GITHUB_OUTPUT"; else echo "publish=false" >> "$GITHUB_OUTPUT"; fi

      - name: Restore Shared
        run: dotnet restore src/Common.Shared/Common.Shared.csproj

      - name: Build Shared
        run: dotnet build src/Common.Shared/Common.Shared.csproj --configuration Release --no-restore

      - name: Pack Shared
        if: steps.shared.outputs.publish == 'true'
        run: >
          dotnet pack src/Common.Shared/Common.Shared.csproj
          --configuration Release
          --no-build
          --output ./nupkgs

      - name: Publish Shared
        if: steps.shared.outputs.publish == 'true'
        run: >
          dotnet nuget push ./nupkgs/Dyvenix.App1.Common.Shared.*.nupkg
          --source github
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      # ── Dyvenix.App1.Common.Data ────────────────────────────────────────────

      - name: Check Data version
        id: data
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/Common.Data/Common.Data.csproj)
          echo "version=$VERSION"
          EXISTS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/download/dyvenix.app1.common.data/index.json" \
            | grep -c "\"$VERSION\"" || true)
          if [ "$EXISTS" = "0" ]; then echo "publish=true" >> "$GITHUB_OUTPUT"; else echo "publish=false" >> "$GITHUB_OUTPUT"; fi

      - name: Restore Data
        if: steps.data.outputs.publish == 'true'
        run: dotnet restore src/Common.Data/Common.Data.csproj

      - name: Build Data
        if: steps.data.outputs.publish == 'true'
        run: dotnet build src/Common.Data/Common.Data.csproj --configuration Release --no-restore

      - name: Pack Data
        if: steps.data.outputs.publish == 'true'
        run: >
          dotnet pack src/Common.Data/Common.Data.csproj
          --configuration Release
          --no-build
          --output ./nupkgs

      - name: Publish Data
        if: steps.data.outputs.publish == 'true'
        run: >
          dotnet nuget push ./nupkgs/Dyvenix.App1.Common.Data.*.nupkg
          --source github
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      # ── Dyvenix.App1.Common.Api ─────────────────────────────────────────────

      - name: Check Api version
        id: api
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/Common.Api/Common.Api.csproj)
          echo "version=$VERSION"
          EXISTS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/download/dyvenix.app1.common.api/index.json" \
            | grep -c "\"$VERSION\"" || true)
          if [ "$EXISTS" = "0" ]; then echo "publish=true" >> "$GITHUB_OUTPUT"; else echo "publish=false" >> "$GITHUB_OUTPUT"; fi

      - name: Restore Api
        if: steps.api.outputs.publish == 'true'
        run: dotnet restore src/Common.Api/Common.Api.csproj

      - name: Build Api
        if: steps.api.outputs.publish == 'true'
        run: dotnet build src/Common.Api/Common.Api.csproj --configuration Release --no-restore

      - name: Pack Api
        if: steps.api.outputs.publish == 'true'
        run: >
          dotnet pack src/Common.Api/Common.Api.csproj
          --configuration Release
          --no-build
          --output ./nupkgs

      - name: Publish Api
        if: steps.api.outputs.publish == 'true'
        run: >
          dotnet nuget push ./nupkgs/Dyvenix.App1.Common.Api.*.nupkg
          --source github
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
